<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
 <defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
   <stop offset="0" stop-color="#3b82f6"/>
   <stop offset="1" stop-color="#7c3aed"/>
  </linearGradient>
 </defs>
 <!-- app tile -->
 <rect width="64" height="64" rx="14" fill="url(#bg)"/>
 <!-- grain boundaries meeting at a triple junction -->
 <g stroke="rgba(255,255,255,.92)" stroke-width="3" stroke-linecap="round" fill="none">
  <path d="M2 17 L31 30 L62 19"/>
  <path d="M31 30 L32 62"/>
 </g>
 <!-- Abrams intercept test circle -->
 <circle cx="32" cy="32" r="16" fill="none" stroke="#ff4d4d" stroke-width="3.2"/>
 <!-- counted intercept marks (circle x boundary) -->
 <g fill="#22ff77" stroke="#06210f" stroke-width="1.2">
  <circle cx="18.1" cy="24" r="3.1"/>
  <circle cx="45.9" cy="24" r="3.1"/>
  <circle cx="32" cy="48" r="3.1"/>
 </g>
</svg>
